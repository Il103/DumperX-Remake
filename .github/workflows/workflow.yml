name: Universal ROM Dumper

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'ROM URL (GDrive, MediaFire, Direct)'
        required: true
        type: string
      source_type:
        description: 'Source type'
        required: true
        type: choice
        options:
          - gdrive
          - mediafire
          - direct
      rom_format:
        description: 'ROM Format'
        required: true
        type: choice
        options:
          - auto
          - spflash
          - fastboot
          - ota
          - super_dynamic
      device_codename:
        description: 'Device codename (e.g. x6886, gta4l)'
        required: true
        type: string
      device_name:
        description: 'Device friendly name'
        required: false
        type: string
      gitgud_repo:
        description: 'GitGud repo (owner/name)'
        required: true
        type: string
      gitgud_host:
        description: 'GitGud host'
        required: true
        type: string
        default: 'https://gitgud.io'

env:
  GITGUD_TOKEN: ${{ secrets.GITGUD_TOKEN }}
  DUMPER_AUTH_KEY: ${{ secrets.DUMPER_AUTH_KEY }}

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y             p7zip-full unzip zip curl wget aria2             liblz4-tool brotli e2fsprogs             python3-pip cpio gzip xz-utils zstd file             libmagic1 git build-essential

      - name: Build simg2img & img2simg
        run: |
          git clone --depth 1 https://github.com/anestisb/android-simg2img.git /tmp/simg2img-build
          cd /tmp/simg2img-build
          make
          sudo cp simg2img img2simg /usr/local/bin/
          simg2img --help 2>/dev/null | head -1 || echo "simg2img OK"
          img2simg --help 2>/dev/null | head -1 || echo "img2simg OK"

      - name: Install Python packages
        run: |
          pip install gdown requests tqdm protobuf bsdiff4

      - name: Clone & build tools
        run: |
          # AIK (Android Image Kitchen) - CORRECT REPO
          git clone --depth 1 https://github.com/osm0sis/Android-Image-Kitchen.git /tmp/AIK ||           wget -q https://github.com/osm0sis/Android-Image-Kitchen/archive/refs/heads/master.zip -O /tmp/aik.zip &&           unzip -q /tmp/aik.zip -d /tmp/AIK_extracted &&           mv /tmp/AIK_extracted/Android-Image-Kitchen-master /tmp/AIK

          # payload_dumper
          git clone --depth 1 https://github.com/vm03/payload_dumper.git /tmp/payload_dumper ||           wget -q https://github.com/vm03/payload_dumper/archive/refs/heads/master.zip -O /tmp/pd.zip &&           unzip -q /tmp/pd.zip -d /tmp/pd_extracted &&           mv /tmp/pd_extracted/payload_dumper-master /tmp/payload_dumper

          # lpunpack
          git clone --depth 1 https://github.com/LonelyFool/lpunpack_and_lpmake.git /tmp/lpunpack ||           wget -q https://github.com/LonelyFool/lpunpack_and_lpmake/archive/refs/heads/master.zip -O /tmp/lp.zip &&           unzip -q /tmp/lp.zip -d /tmp/lp_extracted &&           mv /tmp/lp_extracted/lpunpack_and_lpmake-master /tmp/lpunpack
          cd /tmp/lpunpack && make && sudo cp lpunpack lpmake /usr/local/bin/

          # sdat2img
          git clone --depth 1 https://github.com/xpirt/sdat2img.git /tmp/sdat2img ||           wget -q https://github.com/xpirt/sdat2img/archive/refs/heads/master.zip -O /tmp/sd.zip &&           unzip -q /tmp/sd.zip -d /tmp/sd_extracted &&           mv /tmp/sd_extracted/sdat2img-master /tmp/sdat2img

          # avbtool
          wget -q https://android.googlesource.com/platform/external/avb/+archive/refs/heads/main.tar.gz -O /tmp/avb.tar.gz
          mkdir -p /tmp/avbtool && tar -xzf /tmp/avb.tar.gz -C /tmp/avbtool 2>/dev/null || true

          # magiskboot
          wget -q https://github.com/topjohnwu/Magisk/releases/download/canary/magisk-canary.apk -O /tmp/magisk.apk
          unzip -o /tmp/magisk.apk -d /tmp/magisk 2>/dev/null || true
          sudo cp /tmp/magisk/lib/x86_64/libmagiskboot.so /usr/local/bin/magiskboot 2>/dev/null ||           sudo cp /tmp/magisk/lib/arm64-v8a/libmagiskboot.so /usr/local/bin/magiskboot 2>/dev/null ||           echo "magiskboot not available, using AIK only"

      - name: Run Universal Dumper
        run: python3 dumper.py
        env:
          SOURCE_URL: ${{ github.event.inputs.source_url }}
          SOURCE_TYPE: ${{ github.event.inputs.source_type }}
          ROM_FORMAT: ${{ github.event.inputs.rom_format }}
          DEVICE_CODENAME: ${{ github.event.inputs.device_codename }}
          DEVICE_NAME: ${{ github.event.inputs.device_name }}
          GITGUD_REPO: ${{ github.event.inputs.gitgud_repo }}
          GITGUD_HOST: ${{ github.event.inputs.gitgud_host }}

      - name: Upload artifacts backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rom-dump-backup
          path: output/
          retention-days: 1
